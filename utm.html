<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>條碼辨識 · 拍照自動命名</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            padding: 15px;
            background: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }
        .scan-area {
            position: relative;
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .scan-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 110px;
            border: 3px solid #ff0000;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
            z-index: 3;
            pointer-events: none;
            display: none; /* 預設隱藏，只有掃描時顯示 */
        }
        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #scanBtn { background: #2196F3; color: white; }
        #captureBtn { background: #4CAF50; color: white; }
        #resetBtn { background: #ff9800; color: white; }
        #status {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .success { background: #e8f5e9; color: #2e7d32; }
        .info { background: #e3f2fd; color: #1565c0; }
        .error { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
<div class="container">
 

    <div class="scan-area">
        <video id="camera" autoplay playsinline></video>
        <div class="scan-box"></div>
    </div>

    <div id="status" class="info">點「開始掃描」 → 對準紅框</div>

    <div class="input-group">
        <label>條碼類型</label>
        <select id="barcodeType">
            <option value="code128" selected>CODE-128</option>
            <option value="ean13">EAN-13</option>
            <option value="ean8">EAN-8</option>
        </select>
    </div>

    <div class="input-group">
        <label>手動檔名（選填）</label>
        <input type="text" id="manualName" placeholder="輸入自訂檔名">
    </div>

    <div class="input-group">
        <label>目前檔名</label>
        <input type="text" id="currentName" readonly>
    </div>

    <div class="btn-group">
        <button id="scanBtn">開始掃描</button>
        <button id="captureBtn">拍照儲存</button>
        <button id="resetBtn">刷新相機</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script>
    let lastBarcode = "";
    let currentSuffix = "A";
    let isScanning = false;
    let stream = null;

    const camera = document.getElementById("camera");
    const scanBox = document.querySelector(".scan-box");
    const scanBtn = document.getElementById("scanBtn");
    const captureBtn = document.getElementById("captureBtn");
    const resetBtn = document.getElementById("resetBtn");
    const manualName = document.getElementById("manualName");
    const currentName = document.getElementById("currentName");
    const status = document.getElementById("status");
    const barcodeType = document.getElementById("barcodeType");

    function getReader() {
        const t = barcodeType.value;
        if (t === "code128") return ["code_128_reader"];
        if (t === "ean13") return ["ean_reader"];
        if (t === "ean8") return ["ean_8_reader"];
        return ["code_128_reader"];
    }

    function updateName() {
        const base = manualName.value.trim() || lastBarcode || "未命名";
        currentName.value = base + currentSuffix;
    }

    // 只停止掃描，不關閉相機
    function stopScanning() {
        try {
            Quagga.stop();
        } catch (e) {}
        isScanning = false;
        scanBtn.textContent = "開始掃描";
        scanBox.style.display = "none";
    }

    async function startScan() {
        if (isScanning) {
            stopScanning();
            status.textContent = "已停止掃描";
            status.className = "info";
            return;
        }

        // 開啟相機（如果還沒開）
        if (!stream) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }
                });
                camera.srcObject = stream;
                await camera.play();
            } catch (err) {
                status.textContent = "無法開啟相機：" + err.message;
                status.className = "error";
                return;
            }
        }

        // 顯示掃描框
        scanBox.style.display = "block";

        // 初始化 Quagga（關鍵修改：使用現有的 video 元素）
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: camera,                    // 使用你的 video 元素
                constraints: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    facingMode: "environment"
                }
            },
            decoder: {
                readers: getReader()
            },
            locate: true
        }, function (err) {
            if (err) {
                console.error(err);
                status.textContent = "掃描器啟動失敗：" + err;
                status.className = "error";
                scanBox.style.display = "none";
                return;
            }

            Quagga.start();
            isScanning = true;
            scanBtn.textContent = "停止掃描";
            status.textContent = "掃描中 → 請對準紅框";
            status.className = "info";
        });

        // 條碼辨識成功事件
        Quagga.onDetected(function (res) {
            const code = res.codeResult.code;
            if (code && code !== lastBarcode) {
                lastBarcode = code;
                currentSuffix = "A";
                updateName();

                stopScanning();  // 只停止掃描，不關相機

                status.textContent = "辨識成功： " + code;
                status.className = "success";
            }
        });
    }

    // 拍照按鈕
    captureBtn.onclick = async () => {
        if (!stream) {
            status.textContent = "請先開啟相機";
            status.className = "error";
            return;
        }

        const canvas = document.createElement("canvas");
        canvas.width = camera.videoWidth;
        canvas.height = camera.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(camera, 0, 0);

        const base = manualName.value.trim() || lastBarcode || "未命名";
        const fileName = base + currentSuffix;

        canvas.toBlob(blob => {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = fileName + ".jpg";
            a.click();

            // 自動切換下一個後綴
            currentSuffix = String.fromCharCode(currentSuffix.charCodeAt(0) + 1);
            updateName();

            status.textContent = "已儲存：" + fileName + ".jpg";
            status.className = "success";
        }, "image/jpeg", 0.95);
    };

    // 重置按鈕（完全關閉相機）
    resetBtn.onclick = async () => {
        stopScanning();
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        camera.srcObject = null;
        status.textContent = "已重置相機 → 請重新開始掃描";
        status.className = "info";
    };

    // 手動檔名改變時更新
    manualName.addEventListener("input", () => {
        currentSuffix = "A";
        updateName();
    });

    // 初始化
    scanBtn.onclick = startScan;
    updateName();
</script>
</body>
</html>
