<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>條碼辨識 · 拍照自動命名</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            padding: 15px;
            background: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }
        .scan-area {
            position: relative;
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #interactive {
            width: 100%;
            height: 100%;
            position: absolute;
            top:0; left:0;
        }
        /* 紅色掃描框 - 預設隱藏 */
        .scan-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 110px;
            border: 3px solid #ff0000;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.4);
            z-index: 10;
            pointer-events: none;
            display: none; /* 預設關閉 */
        }
        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #scanBtn { background: #2196F3; color: white; }
        #captureBtn { background: #4CAF50; color: white; }
        #resetBtn { background: #ff9800; color: white; }
        #status {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .success { background: #e8f5e9; color: #2e7d32; }
        .info { background: #e3f2fd; color: #1565c0; }
        .error { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
<div class="container">
    <h2 class="title">條碼辨識 · 拍照自動命名</h2>

    <div class="scan-area">
        <video id="camera" autoplay playsinline></video>
        <div id="interactive"></div>
        <div class="scan-box"></div>
    </div>

    <div id="status" class="info">點開始掃描 → 對準紅框</div>

    <div class="input-group">
        <label>條碼類型</label>
        <select id="barcodeType">
            <option value="code128" selected>CODE-128</option>
            <option value="ean13">EAN-13</option>
            <option value="ean8">EAN-8</option>
        </select>
    </div>

    <div class="input-group">
        <label>手動檔名</label>
        <input type="text" id="manualName" placeholder="輸入自訂檔名">
    </div>

    <div class="input-group">
        <label>目前名稱</label>
        <input type="text" id="currentName" readonly>
    </div>

    <div class="btn-group">
        <button id="scanBtn">開始掃描</button>
        <button id="captureBtn">拍照儲存</button>
        <button id="resetBtn">刷新相機</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script>
    let lastBarcode = "";
    let currentSuffix = "A";
    let isScanning = false;
    let stream = null;

    const camera = document.getElementById("camera");
    const scanBox = document.querySelector(".scan-box");
    const scanBtn = document.getElementById("scanBtn");
    const captureBtn = document.getElementById("captureBtn");
    const resetBtn = document.getElementById("resetBtn");
    const manualName = document.getElementById("manualName");
    const currentName = document.getElementById("currentName");
    const status = document.getElementById("status");
    const barcodeType = document.getElementById("barcodeType");

    function getReader() {
        const t = barcodeType.value;
        if (t === "code128") return ["code_128_reader"];
        if (t === "ean13") return ["ean_reader"];
        if (t === "ean8") return ["ean_8_reader"];
        return ["code_128_reader"];
    }

    async function stopAll() {
        try { Quagga.stop(); } catch (e) {}
        isScanning = false;
        scanBtn.textContent = "開始掃描";
        scanBox.style.display = "none"; // 關閉紅框
    }

    async function startScan() {
        if (isScanning) {
            await stopAll();
            status.textContent = "已停止";
            return;
        }

        await stopAll();
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        
        camera.srcObject = stream;
        camera.style.display = "block";
        await camera.play();

        // 開啟紅框
        scanBox.style.display = "block";

        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.getElementById("interactive"),
                constraints: { video: true }
            },
            decoder: { readers: getReader() }
        }, err => {
            if (err) { status.textContent = "啟動失敗："+err; return; }
            Quagga.start();
            isScanning = true;
            scanBtn.textContent = "掃描中...";
            status.textContent = "掃描中 → 對準紅框";
        });

        Quagga.onDetected(async res => {
            const code = res.codeResult.code;
            if (code !== lastBarcode) {
                lastBarcode = code;
                currentSuffix = "A";
                updateName();
                
                // ✅ 成功後：關閉掃描 + 隱藏紅框 → 進入拍照模式
                Quagga.stop();
                stopAll();
                
                status.textContent = "成功：" + code + " → 可拍照";
                status.className = "success";
            }
        });
    }

    function updateName() {
        const base = manualName.value.trim() || lastBarcode || "未命名";
        currentName.value = base + currentSuffix;
    }

    captureBtn.onclick = async () => {
        if (!stream) { status.textContent = "請先開啟相機"; return; }
        const canvas = document.createElement("canvas");
        canvas.width = camera.videoWidth;
        canvas.height = camera.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(camera, 0, 0);
        
        const base = manualName.value.trim() || lastBarcode || "未命名";
        const fileName = base + currentSuffix;

        canvas.toBlob(b => {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(b);
            a.download = fileName + ".jpg";
            a.click();
            currentSuffix = String.fromCharCode(currentSuffix.charCodeAt(0)+1);
            updateName();
            status.textContent = "已儲存："+fileName+".jpg";
        });
    };

    resetBtn.onclick = async () => {
        await stopAll();
        if(stream) stream.getTracks().forEach(t=>t.stop());
        camera.style.display = "none";
        status.textContent = "已重置 → 點開始掃描";
    };

    scanBtn.onclick = startScan;

    manualName.addEventListener("input", () => {
        currentSuffix = "A";
        updateName();
    });

    updateName();
</script>
</body>
</html>
