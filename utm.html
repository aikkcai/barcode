<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>條碼辨識 · 拍照自動命名</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            padding: 15px;
            background: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            margin-bottom: 15px;
            color: #333;
        }
        .scan-area {
            position: relative;
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        #interactive.viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* 紅色掃描框 */
        .scan-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 100px;
            border: 3px solid #ff0000;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.3);
            z-index: 10;
            pointer-events: none;
        }
        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #scanBtn {
            background: #2196F3;
            color: white;
        }
        #captureBtn {
            background: #4CAF50;
            color: white;
        }
        #resetBtn {
            background: #ff9800;
            color: white;
        }
        #status {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .info {
            background: #e3f2fd;
            color: #1565c0;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 class="title">條碼辨識 · 拍照自動命名</h2>

    <div class="scan-area">
        <div id="interactive" class="viewport"></div>
        <!-- 紅色掃描框 -->
        <div class="scan-box"></div>
    </div>

    <div id="status" class="info">點擊開始掃描，對準紅框掃條碼</div>

    <div class="input-group">
        <label>條碼類型</label>
        <select id="barcodeType">
            <option value="code128" selected>CODE-128 (預設)</option>
            <option value="ean13">EAN-13</option>
            <option value="ean8">EAN-8</option>
        </select>
    </div>

    <div class="input-group">
        <label>手動檔名（優先於條碼）</label>
        <input type="text" id="manualName" placeholder="輸入自訂檔名">
    </div>

    <div class="input-group">
        <label>目前使用名稱</label>
        <input type="text" id="currentName" readonly placeholder="掃描條碼或輸入名稱">
    </div>

    <div class="btn-group">
        <button id="scanBtn">開始掃描</button>
        <button id="captureBtn">拍照儲存</button>
        <button id="resetBtn">刷新相機</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script>
    let lastBarcode = "";
    let currentSuffix = "A";
    let isScanning = false;
    let cameraStream = null;

    const scanBtn = document.getElementById("scanBtn");
    const captureBtn = document.getElementById("captureBtn");
    const resetBtn = document.getElementById("resetBtn");
    const manualNameInput = document.getElementById("manualName");
    const currentNameInput = document.getElementById("currentName");
    const statusText = document.getElementById("status");
    const barcodeTypeSelect = document.getElementById("barcodeType");

    function getSelectedReader() {
        const type = barcodeTypeSelect.value;
        if (type === "code128") return ["code_128_reader"];
        if (type === "ean13") return ["ean_reader"];
        if (type === "ean8") return ["ean_8_reader"];
        return ["code_128_reader"];
    }

    // 重置相機（解決黑屏）
    function resetCamera() {
        try {
            Quagga.stop();
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
        } catch (e) {}
        isScanning = false;
        scanBtn.textContent = "開始掃描";
        statusText.textContent = "已重置 → 點開始掃描";
        statusText.className = "info";
        
        const viewport = document.querySelector('#interactive');
        if (viewport) viewport.innerHTML = '';
    }

    // 掃描條碼
    function startScan() {
        if (isScanning) {
            resetCamera();
            return;
        }

        resetCamera();

        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: { facingMode: "environment" },
            },
            decoder: { readers: getSelectedReader() },
            locator: { patchSize: "medium", halfSample: true }
        }, function (err) {
            if (err) {
                statusText.textContent = "相機異常：" + err;
                statusText.className = "error";
                return;
            }
            Quagga.start();
            isScanning = true;
            scanBtn.textContent = "掃描中...";
            statusText.textContent = "掃描中 → 對準紅色框";
            statusText.className = "info";
        });

        // 掃描成功
        Quagga.onDetected(function (result) {
            const code = result.codeResult.code;
            if (code !== lastBarcode) {
                lastBarcode = code;
                currentSuffix = "A";
                updateCurrentName();
                
                statusText.textContent = "掃描成功：" + code + " → 可拍照";
                statusText.className = "success";
                
                // 不關閉相機 → 直接保持畫面變拍照模式
                isScanning = false;
                scanBtn.textContent = "開始掃描";
            }
        });
    }

    function updateCurrentName() {
        const baseName = manualNameInput.value.trim() || lastBarcode || "未命名";
        currentNameInput.value = baseName + currentSuffix;
    }

    // 拍照
    captureBtn.addEventListener("click", async function () {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }
            });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            const baseName = manualNameInput.value.trim() || lastBarcode || "未命名";
            const fileName = baseName + currentSuffix;

            canvas.toBlob(function (blob) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = fileName + ".jpg";
                link.click();

                stream.getTracks().forEach(track => track.stop());
                currentSuffix = String.fromCharCode(currentSuffix.charCodeAt(0) + 1);
                updateCurrentName();

                statusText.textContent = "儲存：" + fileName + ".jpg";
                statusText.className = "success";
            });
        } catch (err) {
            statusText.textContent = "拍照失敗";
            statusText.className = "error";
        }
    });

    // 按鈕
    scanBtn.addEventListener("click", startScan);
    resetBtn.addEventListener("click", resetCamera);

    manualNameInput.addEventListener("input", function () {
        if (this.value.trim()) currentSuffix = "A";
        updateCurrentName();
    });
</script>
</body>
</html>
